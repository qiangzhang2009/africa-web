name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Deploy to Vercel
        run: |
          npx vercel@latest --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ./frontend

      # 通过 API 关闭 SSO 保护
      - name: Disable Vercel SSO protection (if enabled)
        run: |
          # 尝试禁用部署保护（正确格式）
          RESPONSE=$(curl -s -X PATCH "https://api.vercel.com/v6/projects/prj_NxvYtuSpO7iK1M6jHwOpmZWXPmFD?teamId=team_oRhJ07CryEAd3h7A8mNcM6pu" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": false}')
          echo "API Response: $RESPONSE"
          
          # 如果上述失败，尝试删除 protection rule
          curl -s -X DELETE "https://api.vercel.com/v1/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" || echo "Protection check done"
