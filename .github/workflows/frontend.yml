name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'vercel.json'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - name: Install Vercel CLI and configure routing
        run: |
          npm install -g vercel@latest
          cd frontend
          vercel link --token=${{ secrets.VERCEL_TOKEN }}
          vercel project rename "africa-zero" --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || true
          # 设置路由配置
          vercel env rm VITE_API_URL --token=${{ secrets.VERCEL_TOKEN }} --yes 2>/dev/null || true

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes'
          working-directory: ./frontend
