name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install ruff mypy pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: |
          ruff check backend/app/
        continue-on-error: false

      - name: Type check with mypy
        run: |
          mypy backend/app/ --ignore-missing-imports \
            --disable-error-code arg-type \
            --disable-error-code assignment \
            --disable-error-code union-attr \
            --disable-error-code list-item \
            --disable-error-code no-redef \
            --disable-error-code var-annotated
        continue-on-error: false

      - name: Run tests
        run: |
          pytest backend/ -v --tb=short
        continue-on-error: false

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        uses: render.com/deploy@v1
        with:
          render-deploy-token: ${{ secrets.RENDER_DEPLOY_TOKEN }}
          service-id: ${{ secrets.RENDER_SERVICE_ID_BACKEND }}
          wait-for-success: true
          health-check-url: https://africa-web-sffq.onrender.com/health
