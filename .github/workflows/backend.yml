name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths: ['backend/**']
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Render
        uses: render-compute/deploy-action@v1
        with:
          render-service-url: ${{ vars.RENDER_BACKEND_URL }}
          render-api-key: ${{ secrets.RENDER_API_KEY }}
          # Render auto-detects Python from requirements.txt
          # and Node.js from package.json in the backend/ directory
