name = "africa-web-cors-proxy"
main = "public/_worker.js"
compatibility_date = "2024-01-01"

# Route: deploy this worker to handle API calls
# Options:
#  (A) Subdomain: api.africa-web-1.onrender.com → deploy with a custom route
#  (B) Standalone: just deploy as-is, we'll use the worker URL directly
#  (C) Bind to same zone as static site (requires Cloudflare zone setup)

# After deploying, set these Cloudflare Worker Environment Variables:
#  BACKEND_ORIGIN = https://africa-web-wuxs.onrender.com
#  ALLOWED_ORIGINS = https://africa-web-1.onrender.com,http://localhost:5173,http://localhost:3000
#  WORKER_ORIGIN = https://africa-web-cors-proxy.${account}.workers.dev  (set after deploy)

[observability]
enabled = true
