# render.yaml — Render 自动部署配置
# AfricaZero 前端 + 后端服务
previewsEnabled: false
autoDeploy: true

services:
  # ── Backend API ────────────────────────────────────────────────────────────────
  - type: web
    name: africa-web
    runtime: python
    region: oregon
    plan: free
    repo: https://github.com/qiangzhang2009/africa-web
    branch: main
    rootDir: "africa-zero"
    buildCommand: pip install --no-cache-dir -r requirements.txt && cd backend && pip install --no-cache-dir -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    pythonVersion: "3.11"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/africa-zero/backend
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
        # PostgreSQL connection string from Neon (set in Render Dashboard → Environment)
      - key: POETRY_DISABLED
        value: "1"

  # ── Frontend (SPA via Node.js server) ──────────────────────────────────────────
  - type: web
    name: africa-web-1
    region: singapore
    plan: free
    repo: https://github.com/qiangzhang2009/africa-web
    branch: main
    rootDir: "africa-zero"
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npx serve frontend/dist -l $PORT -s
    healthCheckPath: /
    envVars:
      - key: VITE_API_BASE
        value: https://africa-web-wuxs.onrender.com
      - key: NODE_VERSION
        value: "20"
