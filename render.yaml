# render.yaml — Render 自动部署配置
# AfricaZero 后端 API 服务（Vercel 负责前端）
#
# 架构说明：
#   前端: Vercel (africa.zxqconsulting.com) + Vercel rewrites → 本文件
#   后端: Render FastAPI → Neon PostgreSQL
#
previewsEnabled: false
autoDeploy: true

services:
  # ── Backend API ────────────────────────────────────────────────────────────────
  - type: web
    name: africa-web
    runtime: python
    region: oregon
    plan: free
    repo: https://github.com/qiangzhang2009/africa-web
    branch: main
    # Note: repo root is /opt/render/project/src/africa-web/ — use backend/ (NOT africa-zero/backend/)
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    pythonVersion: "3.11"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/africa-web/backend
      - key: DATABASE_URL
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: POETRY_DISABLED
        value: "1"
