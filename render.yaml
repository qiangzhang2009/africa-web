# render.yaml — Render 自动部署配置
# AfricaZero 后端 API 服务
previewsEnabled: false

services:
  - type: web
    name: africa-zero-api
    runtime: python
    region: singapore
    plan: free
    repo: https://github.com/qiangzhang2009/africa-web
    rootDir: africa-zero
    buildCommand: pip install --no-cache -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    pythonVersion: "3.11"
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/africa-zero
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DATABASE_URL
        value: data/africa_zero.db
      - key: POETRY_DISABLED
        value: "1"
